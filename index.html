<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ne-ko.io</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Courier New', monospace;
      background: #0f0f1a;
      color: #e4e4f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    
    .container {
      text-align: center;
      animation: fadeIn 1.5s ease-out;
    }
    
    h1 {
      font-size: clamp(3rem, 10vw, 6rem);
      font-weight: 700;
      background: linear-gradient(135deg, #ff6ec7, #7873f5, #4ADEDE);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -2px;
    }
    
    .cat {
      font-size: 4rem;
      margin: 1rem 0;
      display: inline-block;
      animation: bob 2s ease-in-out infinite;
    }
    
    p {
      opacity: 0.7;
      font-size: 1rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-top: 1rem;
    }
    
    .blink {
      animation: blink 1s step-end infinite;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    @keyframes bob {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    
    @keyframes blink {
      50% { opacity: 0; }
    }
    
    .bg-grid {
      position: fixed;
      inset: 0;
      background-image: 
        linear-gradient(rgba(120, 115, 245, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(120, 115, 245, 0.05) 1px, transparent 1px);
      background-size: 50px 50px;
      z-index: -1;
    }
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="container">
    <div class="cat">🐱</div>
    <h1>ne-ko</h1>
    <p>coming soon<span class="blink">_</span></p>
  </div>
</body>
</html>
